name: Bug report
description: Report a reproducible problem without sensitive household or credential data.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, private logs, real housefiles, device identifiers, or security exploit details. Use the process in SECURITY.md for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use only synthetic data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: I removed credentials, private paths, personal data, real house data, and device identifiers.
          required: true
